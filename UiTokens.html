<style>
/**
 * tokens.css — базовые стили дашборда (шрифты, KPI, сигналы, таблица)
 * Сборка: npm run build → UiTokens.html
 */
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');

:root {
  /* Brand — клиническая аналитика, спокойный синий */
  --color-primary: #1e4663;
  --color-primary-dark: #0f2b3d;
  --color-accent: #2c7da0;
  --color-success: #1f8a4c;
  --color-warning: #e67e22;
  --color-danger: #c0392b;
  --color-bg: #f0f4f8;
  --color-surface: #ffffff;
  --color-surface-raised: #f8fafc;
  --color-border: rgba(15, 43, 61, 0.1);
  --color-border-strong: rgba(15, 43, 61, 0.16);
  --color-muted: #5b6e8c;

  /* Текстовая иерархия */
  --text-primary: #0f2b3d;
  --text-secondary: #334155;
  --text-tertiary: #5b6e8c;
  --text-muted: #94a3b8;

  /* 8px spacing scale */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-card: 16px;
  --radius-lg: 20px;
  --shadow-card: 0 1px 2px rgba(15, 43, 61, 0.05), 0 4px 16px rgba(15, 43, 61, 0.06);
  --shadow-elevated: 0 8px 32px rgba(15, 43, 61, 0.12);
  --focus-ring: 0 0 0 3px rgba(44, 125, 160, 0.28);

  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
  --duration-fast: 160ms;
  --duration-ui: 200ms;

  --font-sans: 'Manrope', system-ui, -apple-system, sans-serif;
  --dashboard-max: 1600px;
  --dashboard-gutter: clamp(12px, 2.5vw, 28px);
  --dashboard-gap: clamp(16px, 1.8vw, 24px);

  --z-overlay: 9500;
  --z-drawer: 9600;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  -webkit-text-size-adjust: 100%;
}

body.dashboard-phase1 {
  background: var(--color-bg);
  font-family: var(--font-sans);
  color: var(--text-secondary);
  margin: 0;
  min-height: 100dvh;
  overflow-x: clip;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body.dashboard-phase1 h1,
body.dashboard-phase1 h2,
body.dashboard-phase1 h3,
body.dashboard-phase1 h4,
body.dashboard-phase1 .chart-title,
body.dashboard-phase1 .period-info-text {
  color: var(--text-primary);
  text-wrap: balance;
}

body.dashboard-phase1 p,
body.dashboard-phase1 .info-card-content,
body.dashboard-phase1 .signals-list li,
body.dashboard-phase1 .compare-period-note {
  text-wrap: pretty;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Оболочка: ширина от viewport, контент по центру */
body.dashboard-phase1 .dashboard {
  width: min(100%, var(--dashboard-max));
  max-width: 100%;
  margin-inline: auto;
  padding-inline: var(--dashboard-gutter);
  padding-block: clamp(16px, 2vw, 24px);
  box-sizing: border-box;
}

body.dashboard-phase1 #dashboardContent {
  width: 100%;
  max-width: 100%;
  min-width: 0;
}

body.dashboard-phase1 .kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
  gap: var(--dashboard-gap);
  margin-bottom: var(--dashboard-gap);
  width: 100%;
}

body.dashboard-phase1 .charts-row,
body.dashboard-phase1 .rank-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--dashboard-gap);
  margin-bottom: var(--dashboard-gap);
  width: 100%;
}

body.dashboard-phase1 .charts-row--full {
  grid-template-columns: 1fr;
}

body.dashboard-phase1 .coverage-chart-card {
  grid-column: 1 / -1;
  width: 100%;
  min-width: 0;
}

body.dashboard-phase1 .info-blocks-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--dashboard-gap);
  width: 100%;
  margin-bottom: 0;
}

body.dashboard-phase1 .info-blocks-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: var(--space-4) var(--space-5);
  margin-top: var(--dashboard-gap);
  margin-bottom: var(--dashboard-gap);
  box-shadow: var(--shadow-card);
  width: 100%;
  min-width: 0;
}

body.dashboard-phase1 .info-blocks-panel .info-card {
  background: var(--color-surface-raised);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-5);
  box-shadow: none;
}

body.dashboard-phase1 .info-blocks-panel .info-card h4 {
  font-size: 1rem;
  font-weight: 700;
  margin: 0 0 var(--space-3);
  color: var(--color-primary);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

body.dashboard-phase1 .info-card-plans-title {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--space-2);
}

body.dashboard-phase1 .chart-title-note {
  font-size: 0.75rem;
  font-weight: 500;
  color: #5b6e8c;
}

body.dashboard-phase1 .table-update-time {
  margin-top: var(--space-3);
  font-size: 0.7rem;
  text-align: right;
  color: var(--text-tertiary);
}

/* Блок «высокий объём КнСК / низкая доля КнСК+» */
body.dashboard-phase1 .knsk-outlier-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: var(--space-4) var(--space-5);
  margin-bottom: var(--dashboard-gap);
  box-shadow: var(--shadow-card);
  width: 100%;
  min-width: 0;
}

body.dashboard-phase1 .knsk-outlier-header {
  margin-bottom: var(--space-4);
}

body.dashboard-phase1 .knsk-outlier-subtitle {
  margin: var(--space-2) 0 0;
  font-size: 0.78rem;
  color: var(--text-tertiary);
  line-height: 1.45;
  font-variant-numeric: tabular-nums;
}

body.dashboard-phase1 .knsk-outlier-title {
  margin: 0;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

body.dashboard-phase1 .knsk-outlier-note {
  margin: var(--space-3) 0 0;
  font-size: 0.75rem;
  color: var(--text-tertiary);
  line-height: 1.45;
}

body.dashboard-phase1 .chart-card,
body.dashboard-phase1 .rank-card,
body.dashboard-phase1 .rank-tabs-panel,
body.dashboard-phase1 .period-info-block,
body.dashboard-phase1 .signals-panel,
body.dashboard-phase1 .table-container,
body.dashboard-phase1 .info-blocks-panel,
body.dashboard-phase1 .knsk-outlier-panel,
body.dashboard-phase1 .info-card,
body.dashboard-phase1 .compare-panel,
body.dashboard-phase1 .control-panel,
body.dashboard-phase1 .dynamic-panel,
body.dashboard-phase1 .text-fields-panel,
body.dashboard-phase1 .period-input-panel,
body.dashboard-phase1 .viewer-select-panel {
  width: 100%;
  max-width: 100%;
  min-width: 0;
}

body.dashboard-phase1 .chart-title {
  padding-inline: 0;
}

body.dashboard-phase1 canvas:not(#coverageChart) {
  max-height: 280px;
  width: 100% !important;
  display: block;
}

@media (max-width: 900px) {
  body.dashboard-phase1 .charts-row,
  body.dashboard-phase1 .rank-row,
  body.dashboard-phase1 .info-blocks-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 640px) {
  body.dashboard-phase1 .kpi-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 420px) {
  body.dashboard-phase1 .kpi-grid {
    grid-template-columns: 1fr;
  }
}

body.dashboard-phase1 .kpi-value,
body.dashboard-phase1 .kpi-sub,
body.dashboard-phase1 .period-info-text,
body.dashboard-phase1 .cell-bar-label,
body.dashboard-phase1 td[data-numeric],
body.dashboard-phase1 .compare-kpi-vals,
body.dashboard-phase1 .compare-kpi .delta {
  font-variant-numeric: tabular-nums;
}

/* Viewer: легче шапка */
body.dashboard-phase1.viewer-mode .viewer-select-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-card);
  color: var(--color-primary);
}

body.dashboard-phase1.viewer-mode .viewer-select-panel label,
body.dashboard-phase1.viewer-mode .prepared-by span {
  color: var(--color-muted);
}

body.dashboard-phase1.viewer-mode #archiveSelect {
  border: 1px solid var(--color-border);
  color: var(--color-primary);
}

/* Блоки «Сделано» и «Планы» — жирный текст и ссылки */
body.dashboard-phase1 .info-card-content {
  font-size: 0.9rem;
  line-height: 1.55;
  color: #2c3e50;
  word-break: break-word;
}

body.dashboard-phase1 .info-card-content strong,
body.dashboard-phase1 .info-card-content b {
  font-weight: 700;
  color: var(--color-primary);
}

body.dashboard-phase1 .info-card-content a {
  color: var(--color-accent);
  text-decoration: underline;
  text-underline-offset: 2px;
  font-weight: 600;
  word-break: break-word;
}

body.dashboard-phase1 .info-card-content a:hover {
  color: var(--color-warning);
}

/* Период отчёта — как остальные карточки */
body.dashboard-phase1 .period-info-block {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 18px 22px;
  margin-bottom: var(--dashboard-gap);
  box-shadow: var(--shadow-card);
  text-align: center;
}

body.dashboard-phase1 .period-info-text {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--color-primary);
  line-height: 1.45;
  letter-spacing: -0.01em;
}

/* Сигналы — поверхность вместо декоративного градиента */
.signals-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: var(--space-4) var(--space-5);
  margin-bottom: var(--dashboard-gap);
  box-shadow: var(--shadow-card);
}

.signals-panel h3.signals-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.signals-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 0;
  padding: 0;
}

.signals-list li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 0.88rem;
  line-height: 1.45;
  padding: 10px 14px;
  background: var(--color-surface-raised);
  border-radius: 12px;
  border: 1px solid var(--color-border);
  border-left-width: 4px;
  border-left-color: var(--color-accent);
}

.signals-list li.signal-warn {
  border-left-color: var(--color-warning);
  border-color: rgba(230, 126, 34, 0.22);
  background: #fff6ed;
  color: #7a4512;
}

.signals-list li.signal-danger {
  border-left-color: var(--color-danger);
  border-color: rgba(192, 57, 43, 0.2);
  background: #fef2f1;
  color: #8b2918;
}

.signals-list li.signal-success {
  border-left-color: var(--color-success);
  border-color: rgba(31, 138, 76, 0.2);
  background: #eefbf3;
  color: #145a32;
}

.signals-list li .knsk-icon {
  margin-top: 2px;
  color: var(--color-accent);
  flex-shrink: 0;
}

.signals-list li.signal-warn .knsk-icon { color: var(--color-warning); }
.signals-list li.signal-danger .knsk-icon { color: var(--color-danger); }
.signals-list li.signal-success .knsk-icon { color: var(--color-success); }

body.dashboard-phase1 .info-card-content ul {
  margin: 0.4em 0 0.4em 1.2em;
  padding: 0;
}

body.dashboard-phase1 .info-card-content li {
  margin-bottom: 0.35em;
}

/* KPI дельта */
.kpi-card {
  position: relative;
}

.kpi-delta {
  font-size: 0.72rem;
  font-weight: 600;
  margin-top: 6px;
  padding: 3px 8px;
  border-radius: 20px;
  display: inline-block;
  font-variant-numeric: tabular-nums;
}

.kpi-delta.delta-up {
  background: #e8f5e9;
  color: var(--color-success);
}

.kpi-delta.delta-down {
  background: #ffebee;
  color: var(--color-danger);
}

.kpi-delta.delta-neutral {
  background: #f1f5f9;
  color: var(--color-muted);
}

.kpi-delta.delta-hidden {
  display: none;
}

/* Рейтинги — вертикальные графики */
.rank-chart-wrap {
  position: relative;
  height: 220px;
  width: 100%;
}

.rank-chart-wrap canvas {
  width: 100% !important;
  height: 100% !important;
  max-height: 220px !important;
}

.rank-chart-note {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin: var(--space-2) 0 0;
  line-height: 1.4;
}

/* Рейтинги МО — табы */
.rank-tabs-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: var(--space-4) var(--space-5);
  margin-bottom: var(--dashboard-gap);
  box-shadow: var(--shadow-card);
  width: 100%;
  min-width: 0;
}

.rank-tabs-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  margin-bottom: var(--space-2);
}

.rank-group-hint {
  margin: 0 0 var(--space-4);
  font-size: 0.78rem;
  color: var(--text-tertiary);
  line-height: 1.45;
}

.rank-tabs-title {
  margin: 0;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.rank-tabs-nav {
  display: inline-flex;
  gap: var(--space-1);
  padding: 3px;
  background: var(--color-surface-raised);
  border-radius: 999px;
  border: 1px solid var(--color-border);
}

.rank-tab {
  border: none;
  background: transparent;
  padding: var(--space-2) var(--space-4);
  border-radius: 999px;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
}

.rank-tab--active {
  background: var(--color-surface);
  color: var(--text-primary);
  box-shadow: var(--shadow-card);
}

.rank-tab:hover:not(.rank-tab--active) {
  color: var(--text-secondary);
}

.rank-tab:active {
  transform: scale(0.96);
}

.rank-tab:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
}

.rank-tab-panel[hidden] {
  display: none !important;
}

.rank-dual-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--dashboard-gap);
}

.rank-tabs-panel .rank-card {
  background: var(--color-surface-raised);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  box-shadow: none;
}

.rank-quad-grid {
  display: flex;
  flex-direction: column;
  gap: var(--dashboard-gap);
}

.rank-chart-wrap--horizontal {
  height: 240px;
}

.rank-chart-wrap--horizontal canvas {
  max-height: 240px !important;
}

.rank-tabs-panel .rank-chart-wrap.rank-chart-wrap--horizontal {
  height: 240px;
}

@media (max-width: 900px) {
  .rank-dual-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 640px) {
  .rank-tabs-nav {
    width: auto;
    justify-content: flex-start;
  }

  .rank-tab {
    flex: 0 1 auto;
    text-align: center;
    font-size: 0.72rem;
    padding: var(--space-2) var(--space-3);
  }
}

/* Таблица */
.table-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.table-toolbar input[type="search"] {
  flex: 1;
  min-width: 200px;
  padding: 10px 16px;
  border: 1px solid var(--color-border);
  border-radius: 24px;
  font-size: 0.88rem;
  font-family: var(--font-sans);
}

.table-toolbar input[type="search"]:focus-visible {
  outline: none;
  border-color: var(--color-accent);
  box-shadow: var(--focus-ring);
}

.table-filter-hint {
  font-size: 0.75rem;
  color: var(--color-muted);
}

.table-scroll-wrap {
  max-height: min(70vh, 520px);
  overflow: auto;
  border-radius: 12px;
  border: 1px solid var(--color-border);
  -webkit-overflow-scrolling: touch;
}

.table-scroll-wrap table {
  margin: 0;
}

.table-scroll-wrap thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: #f1f5f9;
  box-shadow: 0 1px 0 var(--color-border);
}

tr.table-row-hidden {
  display: none;
}

/* Heatmap % */
td.heat-percent {
  min-width: 120px;
  padding: 8px 10px !important;
}

.cell-bar-wrap {
  position: relative;
  background: #f1f5f9;
  border-radius: 8px;
  height: 28px;
  overflow: hidden;
}

.cell-bar-fill {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  border-radius: 8px;
  opacity: 0.35;
  transition: width 0.2s ease;
}

.cell-bar-fill.heat-high { background: #2e7d32; }
.cell-bar-fill.heat-mid { background: #e67e22; }
.cell-bar-fill.heat-low { background: #c0392b; }

.growth-positive {
  color: #1f8a4c;
  font-weight: 600;
}

.cell-bar-label {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 28px;
  font-weight: 700;
  font-size: 0.72rem;
  font-variant-numeric: tabular-nums;
}

.growth-negative {
  color: var(--color-danger);
  font-weight: 600;
}

/* График охвата — все МО, горизонтальная прокрутка */
.coverage-chart-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  width: 100%;
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
}

.coverage-chart-inner {
  height: 300px;
  min-width: 100%;
}

.coverage-chart-card .chart-title span {
  font-weight: 500;
}

@media (max-width: 640px) {
  .signals-list li { font-size: 0.82rem; }
  .rank-chart-wrap { height: 200px; }
  .table-scroll-wrap { max-height: 50vh; }
  .coverage-chart-inner { height: 260px; }
}
</style>
