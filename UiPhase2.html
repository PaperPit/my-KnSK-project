<style>
/* phase2.css — сравнение отчётов, drawer МО, презентация. Сборка → UiPhase2.html */

.phase2-analytics-row {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 20px;
  margin-bottom: 20px;
}

.phase2-heatmap-card {
  margin-bottom: 20px;
}

.echart-box {
  width: 100%;
  height: 260px;
  min-height: 220px;
}

.echart-box-wide {
  height: min(520px, 70vh);
  min-height: 320px;
}

/* Сравнение отчётов — полноэкранный оверлей */
.compare-overlay {
  position: fixed;
  inset: 0;
  z-index: 9500;
  background: rgba(15, 43, 61, 0.78);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: clamp(16px, 3vh, 32px) clamp(12px, 3vw, 24px);
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}

.compare-overlay.open {
  opacity: 1;
  visibility: visible;
}

.compare-overlay .compare-panel {
  background: white;
  border-radius: 24px;
  padding: 22px 24px 26px;
  border: none;
  margin: auto 0;
  position: relative;
  width: min(100%, 980px);
  max-height: none;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
  transform: translateY(12px) scale(0.98);
  transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
}

.compare-overlay.open .compare-panel {
  transform: translateY(0) scale(1);
}

.compare-panel {
  position: relative;
}

.compare-panel-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: #f1f5f9;
  color: #475569;
  font-size: 1.25rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}

.compare-panel-close:hover {
  background: #e2e8f0;
  color: #1e4663;
}

.compare-panel h3 {
  font-size: 1rem;
  color: #1e4663;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding-right: 36px;
}

.compare-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 14px;
}

.compare-controls select {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid #cbd5e1;
  min-width: 160px;
  font-size: 0.85rem;
}

.compare-controls button {
  background: #2c7da0;
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
}

.compare-controls button:hover {
  background: #1f6392;
}

.compare-kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}

.compare-kpi {
  border-radius: 16px;
  padding: 14px 16px;
  text-align: left;
  color: #fff;
  position: relative;
  overflow: hidden;
  min-height: 118px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 6px 20px rgba(15, 43, 61, 0.12);
}

.compare-kpi::after {
  content: '';
  position: absolute;
  bottom: -24px;
  right: -24px;
  width: 100px;
  height: 50px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  pointer-events: none;
}

.compare-kpi--fact {
  background: linear-gradient(145deg, #0891b2, #0e7490);
}

.compare-kpi--plan {
  background: linear-gradient(145deg, #1e4663, #0c4a6e);
}

.compare-kpi--growth {
  background: linear-gradient(145deg, #059669, #047857);
}

.compare-kpi--colon {
  background: linear-gradient(145deg, #0d9488, #0f766e);
}

.compare-kpi--zno {
  background: linear-gradient(145deg, #c0392b, #9f1239);
}

.compare-kpi-head {
  display: flex;
  align-items: center;
  gap: 8px;
}

.compare-kpi-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.18);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  flex-shrink: 0;
}

.compare-kpi-label {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.88);
}

.compare-kpi-vals {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 6px;
  font-weight: 700;
  font-size: 0.9rem;
  line-height: 1.3;
  font-variant-numeric: tabular-nums;
}

.compare-val--from {
  color: rgba(255, 255, 255, 0.82);
}

.compare-val-arrow {
  color: rgba(255, 255, 255, 0.55);
  font-size: 0.8rem;
  font-weight: 600;
}

.compare-val--to {
  color: #ffffff;
  font-size: 1rem;
}

.compare-kpi .delta {
  font-size: 0.72rem;
  margin-top: auto;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  width: fit-content;
}

.compare-kpi .delta.up {
  color: #ecfdf5;
  background: rgba(255, 255, 255, 0.22);
  border: 1px solid rgba(255, 255, 255, 0.25);
}

.compare-kpi .delta.down {
  color: #fff1f2;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.compare-kpi .delta.neutral {
  color: rgba(255, 255, 255, 0.9);
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.compare-period-note {
  font-size: 0.82rem;
  color: #5b6e8c;
  margin-bottom: 16px;
  line-height: 1.45;
}

.compare-period-hint {
  display: block;
  font-size: 0.75rem;
  margin-top: 4px;
  color: #94a3b8;
}

.compare-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px 20px;
  color: #5b6e8c;
  font-size: 0.9rem;
}

.compare-loading-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #e2e8f0;
  border-top-color: #2c7da0;
  border-radius: 50%;
  animation: compare-spin 0.75s linear infinite;
}

@keyframes compare-spin {
  to {
    transform: rotate(360deg);
  }
}

.compare-error {
  color: #c0392b;
  font-size: 0.88rem;
  padding: 16px;
  background: #fdecea;
  border-radius: 12px;
  margin: 0;
}

/* Legacy flat compare-kpi (fallback) */
.compare-kpi .label {
  font-size: 0.7rem;
  color: #5b6e8c;
  margin-bottom: 4px;
}

.compare-kpi .vals {
  font-size: 0.85rem;
  font-weight: 700;
}

@media (prefers-reduced-motion: reduce) {
  .compare-loading-spinner {
    animation: none;
    border-top-color: #2c7da0;
  }
}

.compare-mo-list {
  font-size: 0.82rem;
}

.compare-mo-list li {
  padding: 6px 0;
  border-bottom: 1px solid #eef2f6;
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.compare-mo-delta.up {
  color: #1f8a4c;
  background: #e6f9ee;
  padding: 2px 8px;
  border-radius: 6px;
}

.compare-mo-delta.down {
  color: #c0392b;
  background: #fdecea;
  padding: 2px 8px;
  border-radius: 6px;
}

.compare-mo-delta.neutral {
  color: #5b6e8c;
}

.compare-mo-lists-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
  margin-top: 4px;
}

.compare-mo-block h4 {
  font-size: 0.85rem;
  color: #1e4663;
  margin-bottom: 8px;
  line-height: 1.35;
}

.compare-mo-list .compare-mo-empty {
  color: #5b6e8c;
  font-style: italic;
  justify-content: flex-start;
}

@media (max-width: 768px) {
  .compare-mo-lists-grid {
    grid-template-columns: 1fr;
  }
}

/* Drawer МО — центрированное модальное окно */
.mo-drawer-overlay {
  position: fixed;
  inset: 0;
  z-index: 9000;
  background: rgba(15, 43, 61, 0.78);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(16px, 3vh, 32px) clamp(12px, 3vw, 24px);
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}

.mo-drawer-overlay.open {
  opacity: 1;
  visibility: visible;
}

.mo-drawer {
  position: relative;
  width: min(100%, 560px);
  max-height: min(90vh, 720px);
  background: white;
  border-radius: 24px;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
  transform: translateY(12px) scale(0.98);
  transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
  overflow-y: auto;
  padding: 24px 26px 28px;
  margin: auto;
}

.mo-drawer-overlay.open .mo-drawer {
  transform: translateY(0) scale(1);
}

.mo-drawer h3 {
  color: #1e4663;
  font-size: 1.05rem;
  margin-bottom: 16px;
  padding-right: 32px;
}

.mo-drawer-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: #f1f5f9;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.1rem;
  color: #475569;
}

.mo-drawer-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}

.mo-drawer-metric {
  background: #f8fafc;
  border-radius: 12px;
  padding: 12px;
}

.mo-drawer-metric .m-label {
  font-size: 0.68rem;
  color: #5b6e8c;
  text-transform: uppercase;
}

.mo-drawer-metric .m-value {
  font-size: 1.2rem;
  font-weight: 800;
  color: #0f2b3d;
}

.mo-drawer-metric .m-delta {
  font-size: 0.7rem;
  margin-top: 4px;
}

.mo-drawer-chart {
  height: 240px;
  width: 100%;
}

.table-mo-hint {
  margin: 12px 0 0;
  padding: 10px 14px;
  font-size: 0.8rem;
  color: #4a6b7c;
  background: #f0f7fb;
  border-radius: 8px;
  border-left: 3px solid #2c7da0;
}

.table-mo-hint .knsk-icon {
  margin-right: 6px;
  color: #2c7da0;
}

/* Кликабельные строки таблицы */
tr.mo-row-clickable {
  cursor: pointer;
  transition: background 0.15s;
}

tr.mo-row-clickable:hover {
  background: #eef6fb !important;
}

/* Toolbar viewer / editor */
.viewer-toolbar,
.dashboard-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 8px;
}

.viewer-toolbar button,
.dashboard-toolbar button,
.toolbar-btn {
  background: white;
  border: 1px solid #cbd5e1;
  padding: 8px 16px;
  border-radius: 24px;
  font-weight: 600;
  font-size: 0.82rem;
  color: #1e4663;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.viewer-toolbar button:hover,
.dashboard-toolbar button:hover,
.toolbar-btn:hover {
  background: #eef6fb;
  border-color: #2c7da0;
}

.toolbar-btn--presentation,
.refresh-btn--presentation {
  background: #e67e22 !important;
  border: none !important;
  color: #fff !important;
}

.toolbar-btn--presentation:hover,
.refresh-btn--presentation:hover {
  background: #d35400 !important;
}

.toolbar-btn--profile {
  background: #2c7da0;
  border: none;
  color: #fff;
}

.toolbar-btn--profile:hover:not(:disabled) {
  background: #1f6392;
}

.toolbar-btn--profile:disabled,
.toolbar-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

/* Селектор профиля МО */
.mo-profile-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  width: 100%;
  margin-top: 4px;
}

.mo-profile-controls label {
  font-size: 0.85rem;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.control-panel .mo-profile-controls label {
  color: #fff;
}

.viewer-select-panel .mo-profile-controls label {
  color: #1e4663;
}

.mo-profile-controls select {
  flex: 1;
  min-width: 200px;
  max-width: 420px;
  padding: 8px 14px;
  border-radius: 30px;
  border: 1px solid #cbd5e1;
  font-size: 0.85rem;
  color: #1e293b;
  background: #fff;
}

.control-panel .mo-profile-controls select {
  border: none;
}

/* Профиль МО — полноэкранный оверлей */
.mo-profile-overlay {
  position: fixed;
  inset: 0;
  z-index: 10001;
  background: rgba(15, 43, 61, 0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: clamp(12px, 2vh, 28px) clamp(10px, 2vw, 20px);
  overflow-y: auto;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}

.mo-profile-overlay.open {
  opacity: 1;
  visibility: visible;
}

.mo-profile-panel {
  background: #fff;
  border-radius: 20px;
  padding: 22px 24px 28px;
  width: min(100%, 1200px);
  max-height: 92vh;
  overflow-y: auto;
  position: relative;
  margin: auto 0;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
  transform: translateY(12px) scale(0.98);
  transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
}

.mo-profile-overlay.open .mo-profile-panel {
  transform: translateY(0) scale(1);
}

.mo-profile-header {
  margin-bottom: 18px;
  padding-right: 40px;
}

.mo-profile-header h2 {
  font-size: 1.35rem;
  font-weight: 800;
  color: #1e4663;
  margin: 0 0 8px;
  line-height: 1.3;
}

.mo-profile-header-meta {
  font-size: 0.85rem;
  color: #5b6e8c;
}

.mo-profile-rank-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.mo-profile-rank-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
}

.mo-profile-rank-badge--top {
  background: #e8f5e9;
  color: #1f8a4c;
}

.mo-profile-rank-badge--mid {
  background: #fff3e0;
  color: #e67e22;
}

.mo-profile-rank-badge--low {
  background: #ffebee;
  color: #c0392b;
}

.mo-profile-kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.mo-profile-kpi {
  border-radius: 16px;
  padding: 14px 16px;
  color: #fff;
  min-height: 88px;
}

.mo-profile-kpi--plan { background: linear-gradient(145deg, #1e4663, #0c4a6e); }
.mo-profile-kpi--fact { background: linear-gradient(145deg, #0891b2, #0e7490); }
.mo-profile-kpi--colon { background: linear-gradient(145deg, #0d9488, #047857); }
.mo-profile-kpi--growth { background: linear-gradient(145deg, #059669, #047857); }

.mo-profile-kpi-label {
  font-size: 0.68rem;
  opacity: 0.88;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.mo-profile-kpi-value {
  font-size: 1.35rem;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}

.mo-profile-insights {
  margin-bottom: 20px;
}

.mo-profile-insights h3 {
  font-size: 0.95rem;
  font-weight: 700;
  color: #1e4663;
  margin-bottom: 10px;
}

.mo-profile-charts-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.mo-profile-chart-card {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 14px 16px;
}

.mo-profile-chart-card h4 {
  font-size: 0.82rem;
  font-weight: 700;
  color: #1e4663;
  margin: 0 0 10px;
}

.mo-profile-chart-wrap {
  position: relative;
  height: 200px;
}

.mo-profile-chart-wrap canvas {
  max-height: 200px !important;
}

.mo-profile-echart {
  height: 220px;
  width: 100%;
}

.mo-profile-history {
  margin-bottom: 16px;
}

.mo-profile-history h3 {
  font-size: 0.95rem;
  font-weight: 700;
  color: #1e4663;

}

.mo-profile-history-scroll {
  max-height: 280px;
  overflow: auto;
  border: 1px solid #e2e8f0;

}

.mo-profile-history table {
  width: 100%;

.mo-profile-history th {

.mo-profile-footer-actions {

  margin-top: 8px;
}

.mo-profile-link-btn {

  border: 1px solid #c5dce8;

  border-radius: 24px;
  font-weight: 600;
  font-size: 0.82rem;

.mo-profile-link-btn:hover {

.mo-drawer-profile-link {

  }
}

/* Режим презентации */
body.presentation-mode {
  background: #0f2b3d !important;
}

body.presentation-mode .control-panel,
body.presentation-mode .dynamic-panel,
body.presentation-mode .text-fields-panel,
body.presentation-mode .period-input-panel,
body.presentation-mode .viewer-select-panel,
body.presentation-mode .compare-controls,
body.presentation-mode .table-toolbar,
body.presentation-mode .mo-drawer-overlay {
  display: none !important;
}

body.presentation-mode .dashboard {
  width: min(100%, 1400px);
  max-width: calc(100vw - 2 * var(--dashboard-gutter, 24px));
  padding-top: 12px;
}

body.presentation-mode .kpi-value {
  font-size: 2.8rem !important;
}

body.presentation-mode .period-info-text {
  font-size: 1.6rem !important;
  color: white !important;
}

body.presentation-mode .period-info-block {
  background: transparent;
  border: none;
}

body.presentation-mode .kpi-card,
body.presentation-mode .chart-card,
body.presentation-mode .rank-card,
body.presentation-mode .signals-panel,
body.presentation-mode .info-card,
body.presentation-mode .table-container {
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
}

body.presentation-mode .compare-overlay {
  display: none !important;
}

body.presentation-mode .presentation-exit {
  display: flex !important;
  align-items: center;
  justify-content: center;
}

.presentation-exit {
  display: none;
  position: fixed;
  top: 16px;
  left: calc(16px + max(0px, (100vw - 2 * var(--dashboard-gutter, 24px) - min(1400px, 100vw - 2 * var(--dashboard-gutter, 24px))) / 2));
  right: auto;
  z-index: 8000;
  background: rgba(255, 255, 255, 0.95);
  border: none;
  padding: 10px 20px;
  border-radius: 24px;
  font-weight: 700;
  font-size: 0.9rem;
  color: #1e4663;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
}

@media (max-width: 900px) {
  .phase2-analytics-row {
    grid-template-columns: 1fr;
  }
}

/* Печать */
@media print {
  body {
    background: white !important;
    padding: 0 !important;
  }

  .control-panel,
