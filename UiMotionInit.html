<script>
/**
 * motionInit.js — spring-анимации (Motion / CSS fallback)
 * Framer Motion — только React; здесь Motion vanilla + CSS.
 */
const SaaSMotion = (function () {
  const spring = { type: 'spring', stiffness: 320, damping: 32, mass: 0.8 };

  function canAnimate() {
    return typeof window.animate === 'function';
  }

  function revealElements(selector, opts) {
    const nodes = Array.from(document.querySelectorAll(selector));
    if (!nodes.length) return Promise.resolve();

    if (canAnimate()) {
      const anim = window.animate(
        nodes,
        { opacity: [0, 1], transform: ['translateY(10px)', 'translateY(0)'] },
        Object.assign({ duration: 0.55, easing: spring }, opts || {})
      );
      return anim && anim.finished ? anim.finished : Promise.resolve();
    }

    nodes.forEach(function (el, i) {
      el.style.animationDelay = i * 40 + 'ms';
      el.classList.add('saas-enter');
    });
    return Promise.resolve();
  }

  function revealDashboard() {
    const root = document.getElementById('dashboardContent');
    if (root) root.classList.add('dashboard-ready');

    const selector =
      '#dashboardContent .saas-surface, #dashboardContent .kpi-card, #dashboardContent .chart-card, #dashboardContent .rank-card, #dashboardContent .signals-panel, #dashboardContent .table-container, #dashboardContent .info-card, #dashboardContent .period-info-block';

    revealElements(selector, {
      delay: canAnimate() && typeof window.stagger === 'function' ? window.stagger(0.035) : undefined,
    }).then(function () {
      if (root) root.classList.add('saas-animated');
    });

    if (canAnimate() && typeof window.stagger === 'function') {
      revealElements('.editor-surface, .control-panel', { delay: window.stagger(0.04) });
    }
  }

  function revealChart(canvas) {
    if (!canvas) return;
    if (canAnimate()) {
      window.animate(
        canvas,
        { opacity: [0, 1], transform: ['scale(0.98)', 'scale(1)'] },
        { duration: 0.45, easing: spring }
      );
    } else {
      canvas.classList.add('chart-canvas-ready');
    }
  }

  function initPage() {
    document.body.classList.add('saas-app');
    revealElements('.editor-surface, .control-panel, .viewer-select-panel', {
      delay: canAnimate() && window.stagger ? window.stagger(0.05) : undefined,
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPage);
  } else {
    initPage();
  }

  return { revealDashboard, revealChart, revealElements, spring };
})();

if (typeof window !== 'undefined') {
  window.SaaSMotion = SaaSMotion;
}
</script>
